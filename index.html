<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Cinematic Memory Viewer - Sound Enabled</title>
    <style>
        body { 
            background: #111; font-family: monospace; 
            margin: 0; display: flex; justify-content: center; 
            align-items: center; height: 100vh; overflow: hidden;
            color: #fff;
        }
        .device { 
            border: 24px solid #1f1f1f; border-radius: 16px; 
            background: #1a1a1a; padding: 25px;
            box-shadow: 0px 30px 60px rgba(0,0,0,0.9), inset 0px 5px 15px rgba(255, 255, 255, 0.05);
            display: flex; flex-direction: column; align-items: center;
        }
        .screen-bezel {
            background: #000; padding: 18px; border-radius: 12px;
            box-shadow: inset 0px 5px 10px rgba(0,0,0,1);
            position: relative;
        }
        .screen { 
            background: #1a1206; width: 420px; height: 420px; 
            position: relative; overflow: hidden;
            border: 2px solid #5a3811;
            /* Inner sublte glow and shadow for depth + outer soft glow */
            box-shadow: inset 0 0 20px rgba(255,140,0,0.3), 0 0 20px rgba(255,140,0,0.15);
        }
        
        canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; 
            image-rendering: auto; 
        }
        
        /* CRT overlay logic */
        .scanlines {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(0,0,0,0) 50%, rgba(0,0,0,0.15) 50%);
            background-size: 100% 4px;
            pointer-events: none; z-index: 50;
        }
        
        /* Noise texture for authentic static feel */
        .noise-layer {
            position: absolute; inset: 0; pointer-events: none; z-index: 51;
            background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)" opacity="0.08"/%3E%3C/svg%3E');
            mix-blend-mode: overlay;
        }

        /* Brief brightness flash overlay when memory is selected */
        .flash-overlay {
            position: absolute; inset: 0; background: #ffb347; z-index: 150; opacity: 0;
            pointer-events: none; mix-blend-mode: screen;
        }
        .flash-active { animation: screen-flash 0.5s ease-out forwards; }
        @keyframes screen-flash {
            0% { opacity: 0.6; filter: brightness(200%); }
            100% { opacity: 0; filter: brightness(100%); }
        }

        .hardware-btn {
            margin-top: 30px; width: 90px; height: 28px;
            background: #ff8c00; border-radius: 14px;
            border: 3px solid #b36200;
            box-shadow: 0px 4px 0px #663800, inset 0px 2px 5px rgba(255,255,255,0.4);
            cursor: pointer; transition: transform 0.1s, box-shadow 0.1s, opacity 0.5s;
            opacity: 0.5;
            pointer-events: none; 
        }
        .hardware-btn:active {
            transform: translateY(4px); box-shadow: 0px 0px 0px #663800, inset 0px 2px 5px rgba(0,0,0,0.5);
        }
        .btn-label {
            margin-top: 10px; color: #cc7a00; font-size: 12px; font-weight: bold; letter-spacing: 2px;
        }

        .power-wall {
            position: absolute; inset: 0; background: #1a1206; 
            z-index: 200; display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: #ffb347;
            font-size: 18px; cursor: pointer; transition: opacity 0.3s;
        }
        .power-wall.hidden { display: none !important; }
        .power-wall:hover { background: #261b0a; }

        .boot-overlay {
            position: absolute; inset: 0; background: #1a1206; 
            z-index: 100; display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: #ffb347;
            transition: opacity 2s ease-in-out;
            font-size: 16px;
        }
        .hidden { display: none !important; }
        
        .sys-text { margin: 15px 0; font-weight: bold; letter-spacing: 1px; white-space: pre-wrap; display: flex;}
        .typewriter-container { width: fit-content; margin: auto; }
        .typewriter { font-size: 26px; font-weight: bold; white-space: pre-wrap; display: flex;}
        
        .glow-text { text-shadow: 0 0 10px rgba(255,179,71,0.8), 0 0 20px rgba(255,179,71,0.4); }

        .typed-cursor::after {
            content: '_';
            animation: blinker 1s step-end infinite;
        }

        @keyframes blinker { 50% { opacity: 0; } }

        .glitch-layer {
            position: absolute; inset: 0; pointer-events: none;
            background: repeating-linear-gradient(0deg, rgba(255,179,71,0.1), rgba(255,179,71,0.1) 2px, transparent 2px, transparent 4px),
                        linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.2) 50%, transparent 100%);
            opacity: 0; mix-blend-mode: color-dodge;
        }
        .glitch-active { animation: glitch-flash 0.1s infinite !important; }
        .glitch-screen-effect { animation: screen-shake 0.15s infinite; }
        
        @keyframes glitch-flash {
            0% { opacity: 0.8; transform: translateY(-5px) scaleY(1.05); filter: contrast(150%) hue-rotate(-10deg); }
            50% { opacity: 0.2; transform: translateY(5px) scaleY(0.95); filter: contrast(50%); }
            100% { opacity: 0.9; transform: translateX(5px); filter: contrast(200%) hue-rotate(10deg); }
        }
        @keyframes screen-shake {
            0% { transform: translate(1px, 2px) }
            50% { transform: translate(-2px, -1px) }
            100% { transform: translate(2px, -2px) }
        }
    </style>
</head>
<body>
    <audio id="sfx-boot" src="sounds/boot.mp3" preload="auto"></audio>
    <audio id="sfx-greet" src="sounds/greet.mp3" preload="auto"></audio>
    <audio id="sfx-type" src="sounds/type.mp3" preload="auto"></audio>
    <audio id="sfx-glitch" src="sounds/glitch.mp3" preload="auto"></audio>
    <audio id="sfx-click" src="sounds/click.mp3" preload="auto"></audio>

    <div class="device">
        <div class="screen-bezel">
            <div class="screen" id="screen">
                
                <canvas id="ambientCanvas" width="840" height="840"></canvas>
                
                <div id="powerWall" class="power-wall">
                    <span class="typed-cursor">> CLICK TO POWER ON</span>
                </div>

                <div id="bootSequence" class="boot-overlay hidden">
                    <div id="bootStep1">
                        <div class="sys-text" id="bootLine1"></div>
                        <div class="sys-text" id="bootLine2"></div>
                    </div>
                    
                    <div id="bootStep2" class="hidden">
                        <div class="typewriter-container glow-text">
                            <div class="typewriter" id="greetLine"></div>
                        </div>
                    </div>

                    <div id="glitchFX" class="glitch-layer hidden"></div>
                </div>

                <div id="flashOverlay" class="flash-overlay"></div>
                <div class="scanlines"></div>
                <div class="noise-layer"></div>
            </div>
        </div>
        
        <div class="hardware-btn" id="actionBtn"></div>
        <div class="btn-label">RECALL (SPACE)</div>
    </div>
    <script src="app.js"></script>
</body>
</html>
